<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Register</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;600&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;font-family:'Poppins';}

body{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background: linear-gradient(135deg,#ff9a9e,#fad0c4);
}

.container{
    width:350px;
    padding:30px;
    border-radius:15px;
    background:white;
    box-shadow:0 10px 30px rgba(0,0,0,0.2);
    text-align:center;
}

h2{margin-bottom:10px;}

input{
    width:100%;
    padding:10px;
    margin-top:12px;
    border-radius:8px;
    border:1px solid #ccc;
}

button{
    width:100%;
    padding:10px;
    margin-top:15px;
    border:none;
    border-radius:8px;
    background:#667eea;
    color:white;
    cursor:pointer;
}

a{
    display:block;
    margin-top:10px;
}
</style>
</head>

<body>

    <div class="top-header">
    <h1>Real-Time Signature Detection & Validation System</h1>
    <p>Secure Authentication using Signature & AI Verification</p>
    </div>

<div class="container">
    <h2>📝 Register</h2>

    <input type="text" id="user" placeholder="Username">
    <input type="password" id="pass" placeholder="Password">

    <button onclick="register()">Register</button>

    <a href="login.html">Already have account?</a>
</div>

<script>
function register(){
    let u=user.value, p=pass.value;
    localStorage.setItem(u,p);
    alert("Registered Successfully");
}
function register(){
    let u = user.value;
    let p = pass.value;

    if(!u || !p){
        alert("Fill all fields");
        return;
    }

    localStorage.setItem(u, p);

    alert("Registered Successfully");

    // 👉 Go to login
    window.location = "login.html";
}
</script>

</body>
</html>
