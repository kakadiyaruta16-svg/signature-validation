<!DOCTYPE html>
<html>
<head>
<title>Admin</title>
<style>
body{background:#222;color:white;text-align:center;}
table{margin:auto;border-collapse:collapse;}
td,th{border:1px solid white;padding:10px;}
</style>
</head>

<body>

<h1>Admin Panel</h1>

<table id="table">
<tr><th>Username</th><th>Signature</th><th>Photo</th></tr>
</table>

<script>
async function load(){
let res=await fetch("http://localhost:3000/allUsers");
let data=await res.json();

data.forEach(u=>{
table.innerHTML+=`
<tr>
<td>${u.username}</td>
<td><img src="${u.signature}" width="50"></td>
<td><img src="${u.photo}" width="50"></td>
</tr>`;
});
}
load();
</script>

</body>
</html>
